name: Deploy AI Startup with Local LLM

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'railway'
        type: choice
        options:
          - railway
          - github_codespace
          - local_test

jobs:
  # ============================================
  # JOB 1: Test with Local LLM (Ollama)
  # ============================================
  test-local-llm:
    runs-on: ubuntu-latest
    name: Test with Ollama Local LLM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          cache: true

      - name: Pull lightweight models
        run: |
          echo "Pulling Qwen3 0.6B (fast, small)..."
          ollama pull qwen3:0.6b
          echo "Pulling TinyLlama (coding)..."
          ollama pull tinyllama
          echo "Models pulled successfully"
          ollama list

      - name: Test Ollama API
        run: |
          echo "Testing Ollama API..."
          curl -s http://localhost:11434/api/tags | jq .

          echo "Testing model inference..."
          curl -s http://localhost:11434/api/generate -d '{
            "model": "qwen3:0.6b",
            "prompt": "Say hello in one word",
            "stream": false
          }' | jq .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests with local LLM
        env:
          OLLAMA_HOST: http://localhost:11434
          LLM_MODE: local
          GROQ_API_KEY: ""  # Force local only
        run: |
          cd backend
          pytest tests/ -v --tb=short || true

  # ============================================
  # JOB 2: Deploy to Railway
  # ============================================
  deploy-railway:
    needs: test-local-llm
    runs-on: ubuntu-latest
    name: Deploy to Railway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service=ai-startup --detach

  # ============================================
  # JOB 3: Setup GitHub Codespace with Ollama
  # ============================================
  setup-codespace:
    if: github.event.inputs.deploy_target == 'github_codespace'
    runs-on: ubuntu-latest
    name: Setup GitHub Codespace Config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create devcontainer config
        run: |
          mkdir -p .devcontainer
          cat > .devcontainer/devcontainer.json << 'EOF'
          {
            "name": "AI Startup with Local LLM",
            "image": "mcr.microsoft.com/devcontainers/python:3.11",
            "features": {
              "ghcr.io/devcontainers/features/node:1": {},
              "ghcr.io/devcontainers/features/docker-in-docker:2": {}
            },
            "postCreateCommand": "bash .devcontainer/post-create.sh",
            "forwardPorts": [8000, 11434, 3000],
            "portsAttributes": {
              "8000": {"label": "Backend API"},
              "11434": {"label": "Ollama LLM"},
              "3000": {"label": "Frontend"}
            },
            "customizations": {
              "vscode": {
                "extensions": [
                  "ms-python.python",
                  "ms-python.vscode-pylance",
                  "bradlc.vscode-tailwindcss"
                ]
              }
            }
          }
          EOF

      - name: Create post-create script
        run: |
          cat > .devcontainer/post-create.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Installing Ollama..."
          curl -fsSL https://ollama.com/install.sh | sh

          echo "Pulling models..."
          ollama pull qwen3:0.6b
          ollama pull tinyllama
          ollama pull phi4-mini

          echo "Installing Python dependencies..."
          cd backend && pip install -r requirements.txt

          echo "Installing Node dependencies..."
          cd ../frontend && npm install

          echo "Setup complete!"
          echo "Start backend: cd backend && uvicorn app.main:app --reload"
          echo "Start frontend: cd frontend && npm run dev"
          EOF
          chmod +x .devcontainer/post-create.sh

      - name: Commit devcontainer config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .devcontainer/
          git diff --cached --quiet || git commit -m "Add devcontainer config for Codespaces"
          git push
